<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Event Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 dark:bg-gray-900 min-h-screen flex items-center justify-center p-6">

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
    
    <!-- Column 1d -->
    <div class="grid gap-4">
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Annual Day</p>
      </div>
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-1.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Science Exhibition</p>
      </div>
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-2.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Sports Meet</p>
      </div>
    </div>

    <!-- Column 2 -->
    <div class="grid gap-4">
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-3.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Art Competition</p>
      </div>
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-4.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Yoga Day</p>
      </div>
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-5.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Cultural Fest</p>
      </div>
    </div>

    <!-- Column 3 -->
    <div class="grid gap-4">
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-6.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Teacher’s Day</p>
      </div>
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-7.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Independence Day</p>
      </div>
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-8.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Book Fair</p>
      </div>
    </div>

    <!-- Column 4 -->
    <div class="grid gap-4">
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-9.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Republic Day</p>
      </div>
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-10.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Environment Drive</p>
      </div>
      <div>
        <img class="h-auto max-w-full rounded-lg" src="https://flowbite.s3.amazonaws.com/docs/gallery/masonry/image-11.jpg" alt="">
        <p class="mt-1 text-center text-sm font-semibold text-white">Music Show</p>
      </div>
    </div>

  </div>

</body>
</html>
